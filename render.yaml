services:
  - type: web
    name: kosis-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:starlette_app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: KOSIS_OUTPUT_DIR
        value: /tmp/kosis_charts
      - key: KOSIS_API_KEY
        sync: false   # Render 대시보드에서 직접 입력
